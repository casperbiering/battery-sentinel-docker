name: Build Battery Sentinel

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Specific upstream tag to build (leave empty to auto-detect)"
        required: false
        type: string

concurrency:
  group: build-battery-sentinel
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tags: ${{ steps.detect.outputs.tags }}
      has_tags: ${{ steps.detect.outputs.has_tags }}
      latest_tag: ${{ steps.detect.outputs.latest_tag }}
    steps:
      - name: Set image name
        id: meta
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/battery-sentinel" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for detection
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect unbuilt upstream tags
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          set -euo pipefail

          image_exists() {
            local ref="$1"

            for attempt in 1 2 3; do
              if docker manifest inspect "$ref" > /dev/null 2>&1; then
                return 0
              fi

              sleep "$((attempt * 2))"
            done

            return 1
          }

          LATEST_UPSTREAM=$(gh api "repos/smcneece/battery-sentinel/tags?per_page=1" --jq '.[0].name')

          if [ -n "${{ inputs.tag }}" ]; then
            TAGS_TO_BUILD="${{ inputs.tag }}"
          else
            ONE_WEEK_AGO=$(date -u -v-7d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

            RECENT_TAGS=""
            PAGE=1
            while true; do
              RESPONSE=$(gh api "repos/smcneece/battery-sentinel/events?per_page=100&page=${PAGE}" 2>/dev/null) || break
              COUNT=$(echo "$RESPONSE" | jq 'length')
              [ "$COUNT" = "0" ] && break

              while IFS= read -r line; do
                CREATED_AT=$(echo "$line" | jq -r '.created_at')

                if [[ "$CREATED_AT" < "$ONE_WEEK_AGO" ]]; then
                  break 2
                fi

                if [ "$(echo "$line" | jq -r '.type')" != "CreateEvent" ]; then
                  continue
                fi

                if [ "$(echo "$line" | jq -r '.payload.ref_type // empty')" != "tag" ]; then
                  continue
                fi

                TAG_NAME=$(echo "$line" | jq -r '.payload.ref')
                if [ -z "$RECENT_TAGS" ]; then
                  RECENT_TAGS="$TAG_NAME"
                elif ! grep -Fxq "$TAG_NAME" <<< "$RECENT_TAGS"; then
                  RECENT_TAGS="${RECENT_TAGS}"$'\n'"${TAG_NAME}"
                fi
              done < <(echo "$RESPONSE" | jq -c '.[]')

              PAGE=$((PAGE + 1))
            done

            TAGS_TO_BUILD=""
            while IFS= read -r tag || [ -n "$tag" ]; do
              [ -z "$tag" ] && continue

              if image_exists "${IMAGE}:${tag}"; then
                echo "Already pushed: ${tag}"
                continue
              fi

              if [ -z "$TAGS_TO_BUILD" ]; then
                TAGS_TO_BUILD="$tag"
              else
                TAGS_TO_BUILD="${TAGS_TO_BUILD}"$'\n'"${tag}"
              fi
            done <<< "$RECENT_TAGS"

            TAGS_TO_BUILD=$(echo "$TAGS_TO_BUILD" | tac 2>/dev/null || echo "$TAGS_TO_BUILD")
          fi

          if [ -n "$TAGS_TO_BUILD" ]; then
            echo "Tags to build:"
            echo "$TAGS_TO_BUILD"
          else
            echo "No new tags to build."
          fi

          JSON_ARRAY=$(printf '%s' "$TAGS_TO_BUILD" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          HAS_TAGS=$(echo "$JSON_ARRAY" | jq 'length > 0')
          {
            echo "tags<<EOF"
            echo "$JSON_ARRAY"
            echo "EOF"
            echo "has_tags=${HAS_TAGS}"
            echo "latest_tag=${LATEST_UPSTREAM}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: [detect]
    if: needs.detect.outputs.has_tags == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.tags) }}
      fail-fast: false
      max-parallel: 1
    steps:
      - name: Checkout upstream repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: smcneece/battery-sentinel
          ref: ${{ matrix.tag }}
          path: _upstream

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: docker-tags
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/battery-sentinel" | tr '[:upper:]' '[:lower:]')
          TAGS="${IMAGE}:${{ matrix.tag }}"

          if [ "${{ matrix.tag }}" = "${{ needs.detect.outputs.latest_tag }}" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: _upstream/addon
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha,scope=battery-sentinel
          cache-to: type=gha,scope=battery-sentinel,mode=max
          provenance: false
          sbom: false
