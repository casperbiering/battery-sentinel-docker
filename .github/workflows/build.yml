name: Build Battery Sentinel

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Specific upstream tag to build (leave empty to auto-detect)"
        required: false
        type: string

concurrency:
  group: build-battery-sentinel
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tags: ${{ steps.detect.outputs.tags }}
      has_tags: ${{ steps.detect.outputs.has_tags }}
      latest_tag: ${{ steps.detect.outputs.latest_tag }}
    steps:
      - name: Set image name
        id: meta
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/battery-sentinel" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for detection
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect unbuilt upstream tags
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          set -euo pipefail

          image_exists() {
            local ref="$1"

            for attempt in 1 2 3; do
              if docker manifest inspect "$ref" > /dev/null 2>&1; then
                return 0
              fi

              sleep "$((attempt * 2))"
            done

            return 1
          }

          tag_observed_at() {
            local tag="$1"
            local commit_sha="$2"
            local ref tag_object_type tag_object_sha annotated_date

            ref=$(gh api "repos/smcneece/battery-sentinel/git/ref/tags/${tag}" 2>/dev/null || true)
            tag_object_type=$(echo "$ref" | jq -r '.object.type // empty')
            tag_object_sha=$(echo "$ref" | jq -r '.object.sha // empty')

            if [ "$tag_object_type" = "tag" ] && [ -n "$tag_object_sha" ]; then
              annotated_date=$(gh api "repos/smcneece/battery-sentinel/git/tags/${tag_object_sha}" --jq '.tagger.date // empty' 2>/dev/null || true)
              if [ -n "$annotated_date" ]; then
                echo "$annotated_date"
                return 0
              fi
            fi

            gh api "repos/smcneece/battery-sentinel/commits/${commit_sha}" --jq '.commit.committer.date' 2>/dev/null || echo "1970-01-01T00:00:00Z"
          }

          LATEST_UPSTREAM=$(gh api "repos/smcneece/battery-sentinel/tags?per_page=1" --jq '.[0].name')

          if [ -n "${{ inputs.tag }}" ]; then
            TAGS_TO_BUILD="${{ inputs.tag }}"
          else
            ONE_WEEK_AGO=$(date -u -v-7d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

            RECENT_TAGS=""
            PAGE=1
            while true; do
              RESPONSE=$(gh api "repos/smcneece/battery-sentinel/tags?per_page=100&page=${PAGE}" 2>/dev/null) || break
              COUNT=$(echo "$RESPONSE" | jq 'length')
              [ "$COUNT" = "0" ] && break

              while IFS= read -r line; do
                TAG_NAME=$(echo "$line" | jq -r '.name')
                COMMIT_SHA=$(echo "$line" | jq -r '.commit.sha')
                OBSERVED_AT=$(tag_observed_at "$TAG_NAME" "$COMMIT_SHA")

                if [[ "$OBSERVED_AT" < "$ONE_WEEK_AGO" ]]; then
                  continue
                fi

                if [ -z "$RECENT_TAGS" ]; then
                  RECENT_TAGS="$TAG_NAME"
                elif ! grep -Fxq "$TAG_NAME" <<< "$RECENT_TAGS"; then
                  RECENT_TAGS="${RECENT_TAGS}"$'\n'"${TAG_NAME}"
                fi
              done < <(echo "$RESPONSE" | jq -c '.[]')

              PAGE=$((PAGE + 1))
            done

            TAGS_TO_BUILD=""
            while IFS= read -r tag || [ -n "$tag" ]; do
              [ -z "$tag" ] && continue

              if image_exists "${IMAGE}:${tag}"; then
                echo "Already pushed: ${tag}"
                continue
              fi

              if [ -z "$TAGS_TO_BUILD" ]; then
                TAGS_TO_BUILD="$tag"
              else
                TAGS_TO_BUILD="${TAGS_TO_BUILD}"$'\n'"${tag}"
              fi
            done <<< "$RECENT_TAGS"

            TAGS_TO_BUILD=$(echo "$TAGS_TO_BUILD" | tac 2>/dev/null || echo "$TAGS_TO_BUILD")
          fi

          if [ -n "$TAGS_TO_BUILD" ]; then
            echo "Tags to build:"
            echo "$TAGS_TO_BUILD"
          else
            echo "No new tags to build."
          fi

          JSON_ARRAY=$(printf '%s' "$TAGS_TO_BUILD" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          HAS_TAGS=$(echo "$JSON_ARRAY" | jq 'length > 0')
          {
            echo "tags<<EOF"
            echo "$JSON_ARRAY"
            echo "EOF"
            echo "has_tags=${HAS_TAGS}"
            echo "latest_tag=${LATEST_UPSTREAM}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: [detect]
    if: needs.detect.outputs.has_tags == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.tags) }}
      fail-fast: false
      max-parallel: 1
    steps:
      - name: Checkout upstream repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: smcneece/battery-sentinel
          ref: ${{ matrix.tag }}
          path: _upstream

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: docker-tags
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/battery-sentinel" | tr '[:upper:]' '[:lower:]')
          TAGS="${IMAGE}:${{ matrix.tag }}"

          if [ "${{ matrix.tag }}" = "${{ needs.detect.outputs.latest_tag }}" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: _upstream/addon
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}
          outputs: type=image,push=true,compression=gzip,force-compression=true
          cache-from: type=gha,scope=battery-sentinel
          cache-to: type=gha,scope=battery-sentinel,mode=max
          provenance: false
          sbom: false
